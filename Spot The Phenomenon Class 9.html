<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spot the Phenomenon</title>
<style>
  :root{
    --cyan:#00e5ff; --magenta:#ff3d9a; --violet:#b14dff;
    --good:#21e6a0; --bad:#ff4d6d;
    --paper:#eef2ff; --ink:#15183a;
    --panel:#12163a;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    color:#eaf0ff;
    background:
      radial-gradient(900px 620px at 10% 6%, rgba(0,229,255,.16), transparent 60%),
      radial-gradient(960px 720px at 92% 96%, rgba(255,61,154,.18), transparent 62%),
      radial-gradient(700px 600px at 78% 12%, rgba(177,77,255,.14), transparent 60%),
      linear-gradient(160deg,#0a0e28,#0d1030 52%,#140a2e);
    overflow:hidden; overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
  }
  .app{height:100vh;display:flex;flex-direction:column;padding:clamp(8px,1.6vh,16px);gap:clamp(8px,1.4vh,14px)}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex:none}
  .title h1{margin:0;font-size:clamp(26px,4.2vw,48px);font-weight:800;color:#fff;letter-spacing:.5px;
    text-shadow:0 0 12px rgba(0,229,255,.6),0 0 28px rgba(255,61,154,.4)}
  .controls{display:flex;align-items:center;gap:clamp(6px,1vw,12px);flex-wrap:wrap;justify-content:flex-end}
  .btn{border:none;border-radius:999px;padding:10px 18px;font-weight:700;font-size:clamp(12px,1.3vw,15px);cursor:pointer;color:#fff;background:rgba(255,255,255,.12);transition:transform .12s ease, box-shadow .2s ease, background .2s ease}
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0)}
  .btn.how{background:rgba(0,229,255,.14);color:#7df3ff;border:1.5px solid rgba(0,229,255,.5)}
  .btn.how:hover{box-shadow:0 0 16px rgba(0,229,255,.6)}
  .btn.reset{background:rgba(255,77,109,.16);color:#ff89a0;border:1.5px solid rgba(255,77,109,.6)}
  .btn.reset:hover{box-shadow:0 0 16px rgba(255,77,109,.7);background:rgba(255,77,109,.28)}
  .btn.solution{background:linear-gradient(135deg,var(--violet),var(--cyan));color:#0a0e28}
  .btn.solution:hover{box-shadow:0 0 18px rgba(177,77,255,.7)}
  main{flex:1;display:flex;flex-direction:column;gap:clamp(8px,1.4vh,14px);min-height:0}
  .tray{flex:none;max-height:36vh;overflow:auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:clamp(8px,1.4vh,14px)}
  .tray h2{margin:0 0 8px;color:#cfe9ff;font-size:clamp(12px,1.5vw,16px);font-weight:700}
  .tray h2 span{font-weight:500;color:rgba(207,233,255,.62);font-size:.85em}
  .pool-cards{display:flex;flex-wrap:wrap;gap:clamp(6px,1vw,12px);min-height:30px}
  .card{background:var(--paper);color:var(--ink);border-radius:12px;padding:10px 12px;font-size:clamp(11px,1.25vw,14px);line-height:1.25;max-width:240px;min-width:150px;border:1px solid rgba(255,255,255,.5);box-shadow:0 2px 10px rgba(0,0,0,.35);cursor:grab;touch-action:none;-webkit-user-drag:none}
  .card.dragging{opacity:.35}
  .ghost{position:fixed;z-index:9999;pointer-events:none;background:var(--paper);color:var(--ink);border-radius:12px;padding:10px 12px;font-size:clamp(11px,1.25vw,14px);line-height:1.25;box-shadow:0 16px 34px rgba(0,0,0,.5),0 0 18px rgba(0,229,255,.4);transform:rotate(2deg) scale(1.03)}
  .board{flex:1;overflow:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:clamp(8px,1.1vw,14px);align-content:start;padding-bottom:88px}
  .bucket{background:rgba(18,22,55,.66);border:1.5px solid var(--c);border-top:5px solid var(--c);border-radius:14px;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:140px;box-shadow:0 0 16px -4px var(--c)}
  .bhead{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .term{font-weight:700;font-size:clamp(12px,1.35vw,15px);color:#eef2ff}
  .info{flex:none;width:25px;height:25px;border-radius:50%;border:2px solid var(--c);background:rgba(255,255,255,.06);color:var(--c);font-style:italic;font-weight:700;cursor:pointer;font-size:13px;line-height:1;display:grid;place-items:center;box-shadow:0 0 8px -2px var(--c)}
  .info:hover{background:var(--c);color:#0a0e28}
  .slot{flex:1;border:2px dashed rgba(255,255,255,.28);border-radius:10px;min-height:76px;display:grid;place-items:center;padding:6px;transition:background .15s,border-color .15s}
  .slot .ph{color:rgba(255,255,255,.42);font-size:clamp(10px,1.1vw,12px)}
  .slot .card{max-width:none;width:100%;min-width:0}
  .slot.drop-hover{border-color:var(--cyan);background:rgba(0,229,255,.12)}
  .tray.drop-hover{outline:2px solid rgba(0,229,255,.7);outline-offset:-2px}
  .slot.correct{border-style:solid;border-color:var(--good)}
  .slot.wrong{border-style:solid;border-color:var(--bad)}
  .card.correct{background:var(--good);color:#06251c;box-shadow:0 0 16px rgba(33,230,160,.6)}
  .card.wrong{background:var(--bad);color:#2a0710;box-shadow:0 0 16px rgba(255,77,109,.6)}
  .shake{animation:shake .5s}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}

  .finish-float{position:fixed;right:clamp(14px,2.5vw,30px);bottom:clamp(14px,2.5vh,30px);z-index:500;
    background:linear-gradient(135deg,var(--magenta),var(--violet));color:#fff;border:none;border-radius:999px;
    padding:16px 38px;font-size:clamp(16px,2vw,21px);font-weight:800;letter-spacing:.4px;cursor:pointer;
    box-shadow:0 0 26px rgba(255,61,154,.65),0 10px 26px rgba(0,0,0,.4);transition:transform .12s,box-shadow .2s}
  .finish-float:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 0 38px rgba(255,61,154,.95),0 10px 26px rgba(0,0,0,.4)}
  .finish-float:active{transform:translateY(0) scale(1)}

  .score-pop{position:fixed;top:clamp(12px,2vh,22px);left:50%;transform:translateX(-50%) scale(.7);opacity:0;z-index:600;
    background:var(--panel);border:1.5px solid var(--good);color:#eaf0ff;font-weight:800;font-size:clamp(16px,2vw,23px);
    padding:12px 28px;border-radius:999px;box-shadow:0 0 28px rgba(33,230,160,.6);pointer-events:none;
    transition:transform .38s cubic-bezier(.2,1.5,.4,1),opacity .38s}
  .score-pop.show{transform:translateX(-50%) scale(1);opacity:1}

  .modal-overlay{position:fixed;inset:0;background:rgba(6,8,25,.62);display:none;align-items:center;justify-content:center;padding:20px;z-index:10000}
  .modal-overlay.open{display:flex}
  .modal{position:relative;background:var(--panel);border:1.5px solid rgba(0,229,255,.5);border-radius:18px;max-width:600px;width:100%;max-height:86vh;overflow:auto;padding:clamp(20px,3vw,32px);color:#eaf0ff;
    box-shadow:0 0 44px rgba(0,229,255,.22),0 22px 60px rgba(0,0,0,.55)}
  .modal h3{margin:0 0 16px;font-size:clamp(18px,2.3vw,26px);color:var(--cyan);text-shadow:0 0 12px rgba(0,229,255,.5)}
  .close{position:absolute;top:12px;right:14px;width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#eaf0ff;font-size:20px;cursor:pointer;line-height:1}
  .close:hover{background:rgba(255,255,255,.22)}

  .flow{display:flex;flex-direction:column}
  .flow-step{display:flex;gap:14px;position:relative;padding-bottom:16px}
  .flow-step:not(:last-child)::after{content:"";position:absolute;left:18px;top:42px;bottom:-2px;width:2px;background:linear-gradient(var(--cyan),var(--magenta));opacity:.55}
  .flow-node{flex:none;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:18px;
    background:rgba(0,229,255,.10);border:2px solid rgba(0,229,255,.55);box-shadow:0 0 12px rgba(0,229,255,.35);z-index:1}
  .flow-text{padding-top:8px;line-height:1.45;font-size:clamp(13px,1.45vw,16px)}
  .flow-text b{color:#bff4ff;font-weight:800}
  .info-inline{display:inline-grid;place-items:center;width:21px;height:21px;border-radius:50%;border:2px solid var(--cyan);color:var(--cyan);font-style:italic;font-weight:700;font-size:12px;line-height:1;box-shadow:0 0 9px rgba(0,229,255,.7);vertical-align:-4px}
  .startwrap{text-align:center;margin-top:20px}
  .btn.start{background:linear-gradient(135deg,var(--cyan),var(--violet));color:#06112b;font-size:clamp(16px,2vw,20px);font-weight:800;padding:14px 40px;box-shadow:0 0 24px rgba(0,229,255,.6)}
  .btn.start:hover{transform:translateY(-2px);box-shadow:0 0 34px rgba(0,229,255,.85)}

  .sol-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.12);font-size:clamp(12px,1.35vw,15px)}
  .sol-row:last-child{border-bottom:none}
  .sol-ex{flex:1}
  .sol-term{font-weight:700;white-space:nowrap;text-shadow:0 0 10px currentColor}
  .arrow{color:rgba(255,255,255,.5);font-size:1.1em}

  .flip-backdrop{position:fixed;inset:0;background:rgba(6,8,25,0);transition:background .42s;z-index:9990}
  .flip-backdrop.show{background:rgba(6,8,25,.62)}
  .flip{position:fixed;z-index:9991;perspective:1300px;
    transition:left .46s cubic-bezier(.4,.08,.2,1),top .46s cubic-bezier(.4,.08,.2,1),width .46s cubic-bezier(.4,.08,.2,1),height .46s cubic-bezier(.4,.08,.2,1)}
  .flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .46s cubic-bezier(.4,.08,.2,1)}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;overflow:hidden}
  .flip-front{background:rgba(18,22,55,.96);border:1.5px solid var(--c);border-top:5px solid var(--c);box-shadow:0 0 18px -2px var(--c);padding:10px;display:flex;align-items:flex-start}
  .flip-front .term{color:#eef2ff;font-weight:700;font-size:clamp(12px,1.35vw,15px)}
  .flip-back{transform:rotateY(180deg);background:var(--panel);border:1.5px solid var(--c);box-shadow:0 0 30px -2px var(--c);padding:clamp(18px,3vw,28px);overflow:auto}
  .flip-back h3{margin:0 0 12px;color:var(--c);font-size:clamp(17px,2.2vw,24px);text-shadow:0 0 12px currentColor}
  .flip-back p{margin:0;line-height:1.55;font-size:clamp(13px,1.45vw,16px);color:#eaf0ff}
  .flip-back .close{background:rgba(255,255,255,.12)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title"><h1>Spot the Phenomenon</h1></div>
    <div class="controls">
      <button class="btn how" onclick="openHowto()">How to play</button>
      <button class="btn reset" onclick="resetGame()">Reset</button>
      <button class="btn solution" id="solBtn" style="display:none" onclick="openSolution()">Show solution</button>
    </div>
  </header>
  <main>
    <section class="tray" id="tray" data-dropzone="pool">
      <h2>Examples <span>(drag each onto the term it shows)</span></h2>
      <div class="pool-cards" id="poolCards"></div>
    </section>
    <section class="board" id="board"></section>
  </main>
</div>

<button class="finish-float" onclick="finish()">Finish</button>
<div class="score-pop" id="scorePop"></div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this&&this.dataset.dismissable==='1')closeModal()">
  <div class="modal">
    <button class="close" id="modalClose" aria-label="Close" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  const DATA = [
    { term:"Marked and unmarked terms", color:"#00E5FF",
      ex:`"Have you met the new female engineer?"`,
      expl:`Unmarked terms are the default, neutral, or most common words in a pair. Marked terms are modified or specific variations that imply extra meaning, expectation, or exception. For example, the English language often treats the male form as the universal default (unmarked) and the female form as an exception (marked) by adding a suffix. Unmarked forms subconsciously frame the dominant or expected group.` },
    { term:"Othering", color:"#FFD23F",
      ex:`"Your English is great. Where are you really from?"`,
      expl:`This is the act of treating a specific group or individual as fundamentally different, alien, or inferior to the perceived "norm." It creates an "us vs. them" mentality, establishing the speaker's group as the default while marginalizing anyone outside of it. Subtle phrases can imply who the speaker considers part of their community.` },
    { term:"Backhanded compliment", color:"#8CF04A",
      ex:`"You're pretty smart for an athlete."`,
      expl:`This is an insult disguised as praise. It combines a seemingly pleasant statement with an underlying criticism, stereotype, or negative comparison. These remarks leave the recipient confused or undermined. Research into interpersonal dynamics reveals that people sometimes use these comments to appear flattering while subtly asserting superiority. Sometimes, speakers deliver these remarks due to a lack of social tact, poor communication skills, or unexamined assumptions.` },
    { term:"Pre-emptive disclaimer", color:"#21E6A0",
      ex:`"No offense, but that haircut really doesn't suit you."`,
      expl:`This is a conversational tactic used to soften or qualify a statement before it is delivered. By anticipating criticism or misinterpretation, speakers use these phrases to manage their social image, avoid conflict, or distance themselves from potential backlash. The primary function of a preemptive disclaimer is face-saving. By acknowledging the potential negative impact of their words ahead of time, speakers try to insulate themselves from being judged, blamed, or held accountable for the harshness of their message.` },
    { term:"Reductive labelling", color:"#4D9BFF",
      ex:`"The disabled should sit at the front."`,
      expl:`This is the practice of boiling down a complex person, group, or situation into a single, oversimplified tag or category. It replaces nuance with a stereotype.` },
    { term:"Tone policing", color:"#B14DFF",
      ex:`"Calm down, there's no need to get so emotional about this."`,
      expl:`This is a rhetorical tactic where someone dismisses an argument based on the speaker's emotional delivery. It is frequently used by individuals in positions of privilege or authority to avoid discussing an uncomfortable topic. By shifting the focus to how something is said, they can avoid addressing the issue itself. It creates a double standard where only one side is expected to remain calm, ignoring the reality that intense emotions (like anger or passion) are a natural response to injustice or unfair treatment.` },
    { term:"Overaccommodation", color:"#FF6FB5",
      ex:`A shopkeeper speaks very slowly and loudly to a customer with an accent.`,
      expl:`Someone adjusts their speech far more than the situation requires, for instance toward a person with an accent or an older person. The exaggerated help signals that the other person is seen as less capable.` },
    { term:"Coded language", color:"#FF3D9A",
      ex:`"We just want to keep this a neighbourhood for real locals."`,
      expl:`This is a style of communication that uses seemingly neutral, everyday words or phrases to convey a hidden, alternative, or culturally understood meaning. It allows speakers to bypass explicit taboos or directly express biases while ensuring that in-group members immediately grasp the true intent. It can be highly problematic because it reinforces stereotypes and allows underlying biases to remain hidden in plain sight.` },
    { term:"Essentialism", color:"#20D4D4",
      ex:`"Boys are tough and girls are sensitive."`,
      expl:`This is the belief that people, objects, or categories have an underlying, unchanging, and inherent "true nature". It frames identity or characteristics as fixed and natural. It assumes a category is uniform and ignores how social environments, history, and individual choices shape people.` },
    { term:"Euphemism treadmill", color:"#FF7A5C",
      ex:`A polite term for a group is swapped for a new one every few years.`,
      expl:`This is the continuous cycle of replacing an offensive or taboo term with a new, neutral word. Over time, the new word becomes associated with the negative concept, takes on a stigma, and must be replaced again.` }
  ];

  let pool = [], slots = {}, bucketOrder = [], locked = false, drag = null, hover = null;

  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  function init(){
    const ids = DATA.map((_,i)=>i);
    pool = shuffle(ids);
    bucketOrder = shuffle(ids);
    slots = {}; ids.forEach(i=>slots[i]=null);
    locked = false;
    document.getElementById('solBtn').style.display='none';
    document.getElementById('scorePop').classList.remove('show');
    render();
  }

  function makeCard(id){
    const c=document.createElement('div');
    c.className='card'; c.textContent=DATA[id].ex; c.dataset.ex=id;
    if(!locked) c.addEventListener('pointerdown', e=>startDrag(e,id));
    return c;
  }

  function render(){
    const poolCards=document.getElementById('poolCards');
    poolCards.innerHTML='';
    pool.forEach(id=>poolCards.appendChild(makeCard(id)));

    const board=document.getElementById('board');
    board.innerHTML='';
    bucketOrder.forEach(t=>{
      const b=document.createElement('div'); b.className='bucket'; b.dataset.bucket=t; b.style.setProperty('--c',DATA[t].color);
      const head=document.createElement('div'); head.className='bhead';
      const name=document.createElement('span'); name.className='term'; name.textContent=DATA[t].term;
      const info=document.createElement('button'); info.className='info'; info.textContent='i';
      info.setAttribute('aria-label','Explanation'); info.onclick=()=>openInfo(t);
      head.appendChild(name); head.appendChild(info);
      const slot=document.createElement('div'); slot.className='slot'; slot.dataset.dropzone=t; slot.dataset.slot=t;
      if(slots[t]!=null){ slot.appendChild(makeCard(slots[t])); }
      else { const ph=document.createElement('span'); ph.className='ph'; ph.textContent='Drop example here'; slot.appendChild(ph); }
      b.appendChild(head); b.appendChild(slot); board.appendChild(b);
    });
  }

  function startDrag(e,id){
    if(locked) return;
    e.preventDefault();
    const card=e.currentTarget;
    const rect=card.getBoundingClientRect();
    const ghost=card.cloneNode(true);
    ghost.className='ghost'; ghost.style.width=rect.width+'px';
    ghost.style.left=rect.left+'px'; ghost.style.top=rect.top+'px';
    document.body.appendChild(ghost);
    card.classList.add('dragging');
    drag={ id, dx:e.clientX-rect.left, dy:e.clientY-rect.top, ghost };
    window.addEventListener('pointermove',onMove);
    window.addEventListener('pointerup',onUp);
    window.addEventListener('pointercancel',onCancel);
  }
  function zoneAt(x,y){ const el=document.elementFromPoint(x,y); return el?el.closest('[data-dropzone]'):null; }
  function setHover(z){ if(hover&&hover!==z) hover.classList.remove('drop-hover'); if(z) z.classList.add('drop-hover'); hover=z; }
  function onMove(e){
    if(!drag) return;
    drag.ghost.style.left=(e.clientX-drag.dx)+'px';
    drag.ghost.style.top=(e.clientY-drag.dy)+'px';
    setHover(zoneAt(e.clientX,e.clientY));
  }
  function cleanup(){
    if(drag&&drag.ghost) drag.ghost.remove();
    setHover(null); drag=null;
    window.removeEventListener('pointermove',onMove);
    window.removeEventListener('pointerup',onUp);
    window.removeEventListener('pointercancel',onCancel);
  }
  function onUp(e){
    if(!drag) return;
    const z=zoneAt(e.clientX,e.clientY);
    const id=drag.id, target=z?z.dataset.dropzone:null;
    cleanup();
    if(target!==null) applyDrop(id,target);
    render();
  }
  function onCancel(){ cleanup(); render(); }

  function detach(id){
    const i=pool.indexOf(id); if(i>=0) pool.splice(i,1);
    for(const t in slots){ if(slots[t]===id) slots[t]=null; }
  }
  function applyDrop(id,target){
    detach(id);
    if(target==='pool'){ pool.push(id); return; }
    const t=Number(target);
    if(slots[t]!=null){ pool.push(slots[t]); }
    slots[t]=id;
  }

  function finish(){
    const placed=Object.values(slots).filter(v=>v!=null).length;
    if(placed<DATA.length){
      document.querySelectorAll('.slot').forEach(s=>{ if(!s.querySelector('.card')) shake(s); });
      document.querySelectorAll('#poolCards .card').forEach(shake);
      return;
    }
    locked=true;
    let correct=0;
    bucketOrder.forEach(t=>{
      const slot=document.querySelector(`[data-slot='${t}']`);
      const card=slot.querySelector('.card');
      if(slots[t]===t){ correct++; slot.classList.add('correct'); card.classList.add('correct'); }
      else { slot.classList.add('wrong'); card.classList.add('wrong'); }
    });
    const sp=document.getElementById('scorePop');
    sp.textContent=`Score ${correct} / ${DATA.length}`;
    sp.classList.remove('show'); void sp.offsetWidth; sp.classList.add('show');
    document.getElementById('solBtn').style.display='';
  }
  function shake(el){ el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),550); }
  function resetGame(){ init(); }

  const overlay=document.getElementById('modal');
  function openModal(html,opts){
    opts=opts||{};
    const showClose=opts.showClose!==false, dismissable=opts.dismissable!==false;
    document.getElementById('modalContent').innerHTML=html;
    document.getElementById('modalClose').style.display=showClose?'':'none';
    overlay.dataset.dismissable=dismissable?'1':'0';
    overlay.classList.add('open');
  }
  function closeModal(){ overlay.classList.remove('open'); }
  function esc(s){ return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  function buildFlow(){
    const steps=[
      ["🎯",`Match each everyday <b>example</b> to the <b>phenomenon</b> it shows.`],
      ["✋",`<b>Drag</b> an example card from the top onto the <b>term</b> that fits it.`],
      ["🔁",`A placed card can be <b>moved again</b> any time before the round ends.`],
      ["ℹ️",`The <span class="info-inline">i</span> button on a term opens a short <b>explanation</b>.`],
      ["🏁",`Press <b>Finish</b> once <b>every example</b> sits on a term.`],
      ["🚦",`<b>Correct</b> matches turn <b>green</b>, <b>wrong</b> ones turn <b>red</b>, and the <b>score</b> appears.`],
      ["💡",`<b>Show solution</b> reveals the <b>correct term</b> for every example.`],
      ["🧹",`<b>Reset</b> clears the board for a <b>fresh start</b>.`]
    ];
    const rows=steps.map(s=>`<div class="flow-step"><div class="flow-node">${s[0]}</div><div class="flow-text">${s[1]}</div></div>`).join('');
    return `<h3>How to play</h3><div class="flow">${rows}</div>`;
  }
  function openStart(){ openModal(buildFlow()+`<div class="startwrap"><button class="btn start" onclick="closeModal()">Start &#9654;</button></div>`,{showClose:false,dismissable:false}); }
  function openHowto(){ openModal(buildFlow(),{showClose:true,dismissable:true}); }
  function openSolution(){
    const rows=DATA.map(d=>`<div class="sol-row"><span class="sol-ex">${esc(d.ex)}</span><span class="arrow">&rarr;</span><span class="sol-term" style="color:${d.color}">${esc(d.term)}</span></div>`).join('');
    openModal(`<h3>Correct matches</h3>${rows}`,{showClose:true,dismissable:true});
  }

  function openInfo(t){
    const bucket=document.querySelector(`.bucket[data-bucket='${t}']`);
    const r=bucket.getBoundingClientRect();
    const color=DATA[t].color;
    const bd=document.createElement('div'); bd.className='flip-backdrop'; document.body.appendChild(bd);
    const flip=document.createElement('div'); flip.className='flip';
    flip.style.left=r.left+'px'; flip.style.top=r.top+'px'; flip.style.width=r.width+'px'; flip.style.height=r.height+'px';
    flip.innerHTML=`<div class="flip-inner">
        <div class="flip-front" style="--c:${color}"><span class="term">${esc(DATA[t].term)}</span></div>
        <div class="flip-back" style="--c:${color}"><button class="close" aria-label="Close">&times;</button><h3>${esc(DATA[t].term)}</h3><p>${esc(DATA[t].expl)}</p></div>
      </div>`;
    document.body.appendChild(flip);
    const W=Math.min(560,window.innerWidth-40), H=Math.min(window.innerHeight*0.72,470);
    const L=(window.innerWidth-W)/2, T=(window.innerHeight-H)/2;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      bd.classList.add('show');
      flip.style.left=L+'px'; flip.style.top=T+'px'; flip.style.width=W+'px'; flip.style.height=H+'px';
      flip.classList.add('flipped');
    }));
    let closing=false;
    function close(){
      if(closing) return; closing=true;
      bd.classList.remove('show');
      flip.classList.remove('flipped');
      flip.style.left=r.left+'px'; flip.style.top=r.top+'px'; flip.style.width=r.width+'px'; flip.style.height=r.height+'px';
      setTimeout(()=>{ flip.remove(); bd.remove(); },470);
    }
    flip.querySelector('.close').onclick=close;
    bd.onclick=close;
  }

  window.addEventListener('load',()=>{ init(); openStart(); });
</script>
</body>
</html>
